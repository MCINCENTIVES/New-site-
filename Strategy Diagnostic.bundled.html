  <script>
    
document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

      <\u002Fnav>\n      <div style=\"position:relative;z-index:4;display:grid;grid-template-columns:1.25fr .75fr;gap:40px;align-items:center;padding:40px 36px 52px\">\n        <div>\n          <h1 style=\"font-size:54px;line-height:.97;letter-spacing:-.03em;margin:0 0 20px;font-weight:800;text-transform:uppercase\">The Strategy Diagnostic. <span style=\"color:var(--ghost)\">A 3-week executive sprint.<\u002Fspan><\u002Fh1>\n          <p style=\"font-size:15px;line-height:1.55;color:var(--soft);max-width:48ch;margin:0 0 28px\">A fast, structured diagnosis of where your workforce performance systems are breaking — reward, recognition, performance and role design — translated into a prioritised, commercially-framed roadmap your leadership team can act on.<\u002Fp>\n          <div style=\"display:flex;gap:12px;flex-wrap:wrap\">\n            <a href=\"Contact.bundled.html\" style=\"background:var(--orange);color:#fff;text-decoration:none;font-weight:700;font-size:15px;padding:16px 28px;border-radius:999px\">Book your diagnostic<\u002Fa>\n            <a href=\"Rollout.bundled.html\" style=\"background:var(--ink);color:#fff;text-decoration:none;font-weight:700;font-size:15px;padding:16px 26px;border-radius:999px\">See the Rollout →<\u002Fa>\n          <\u002Fdiv>\n        <\u002Fdiv>\n        <div style=\"background:#fff;border-radius:24px;padding:30px 30px;box-shadow:0 30px 60px -45px rgba(35,34,34,.5)\">\n          <div style=\"font-size:11px;letter-spacing:.12em;text-transform:uppercase;color:var(--soft);font-weight:700;margin-bottom:14px\">At a glance<\u002Fdiv>\n          <div style=\"display:flex;flex-direction:column;gap:13px\">\n            <div style=\"display:flex;justify-content:space-between;align-items:baseline;border-bottom:1px solid var(--line);padding-bottom:11px\"><span style=\"font-size:14px;color:var(--soft)\">Duration<\u002Fspan><span style=\"font-size:16px;font-weight:800\">3-week sprint<\u002Fspan><\u002Fdiv>\n            <div style=\"display:flex;justify-content:space-between;align-items:baseline;border-bottom:1px solid var(--line);padding-bottom:11px\"><span style=\"font-size:14px;color:var(--soft)\">Investment<\u002Fspan><span style=\"font-size:16px;font-weight:800\">From $3,500 + GST<\u002Fspan><\u002Fdiv>\n            <div style=\"display:flex;justify-content:space-between;align-items:baseline;border-bottom:1px solid var(--line);padding-bottom:11px\"><span style=\"font-size:14px;color:var(--soft)\">Credited<\u002Fspan><span style=\"font-size:16px;font-weight:800;color:var(--orange)\">100% to Rollout<\u002Fspan><\u002Fdiv>\n            <div style=\"display:flex;justify-content:space-between;align-items:baseline\"><span style=\"font-size:14px;color:var(--soft)\">Debrief<\u002Fspan><span style=\"font-size:16px;font-weight:800\">In 5 business days<\u002Fspan><\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- WHAT IT IS / WHY -->\n  <section style=\"max-width:1280px;margin:84px auto 0;padding:0 22px;animation:rise .8s cubic-bezier(.2,.7,.2,1) both\">\n    <div style=\"display:grid;grid-template-columns:.9fr 1.1fr;gap:46px;align-items:start\">\n      <div>\n        <div style=\"font-size:12px;letter-spacing:.16em;text-transform:uppercase;color:var(--orange);font-weight:700;margin-bottom:16px\">What it is<\u002Fdiv>\n        <h2 style=\"font-size:36px;line-height:1.02;letter-spacing:-.025em;margin:0;font-weight:800;text-transform:uppercase\">A performance-system diagnostic — <span style=\"color:var(--ghost)\">not an HR audit.<\u002Fspan><\u002Fh2>\n      <\u002Fdiv>\n      <div>\n        <p style=\"font-size:17px;line-height:1.62;color:var(--ink);margin:0 0 16px\">The Strategy Diagnostic is an objective, executive-level assessment of how your reward, recognition and performance systems function as one architecture — and where they are quietly working against revenue, retention and productivity.<\u002Fp>\n        <p style=\"font-size:16px;line-height:1.62;color:var(--soft);margin:0\">It exists because AI is reshaping roles faster than systems can adapt: work drifts from its definition, contribution becomes harder to measure, and misaligned reward erodes trust. We isolate the structural root causes — then sequence what to fix, and in what order.<\u002Fp>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- IMAGE BAND -->\n  <section style=\"max-width:1280px;margin:84px auto 0;padding:0 22px;animation:rise .8s cubic-bezier(.2,.7,.2,1) both\">\n    <div style=\"position:relative;height:400px;border-radius:34px;overflow:hidden;background:var(--peach)\">\n      <img src=\"23a5f6bf-bcfe-4807-a896-35de2b66c578\" alt=\"\" style=\"position:absolute;inset:0;width:100%;height:100%;object-fit:cover\">\n      <div style=\"position:absolute;inset:0;background:linear-gradient(110deg,rgba(18,12,8,.6),rgba(18,12,8,.1) 60%,transparent);z-index:2\"><\u002Fdiv>\n      <div style=\"position:absolute;left:42px;bottom:38px;z-index:3;color:#fff;max-width:32ch\">\n        <div style=\"font-size:11px;letter-spacing:.16em;text-transform:uppercase;font-weight:700;opacity:.85;margin-bottom:10px\">On-site, executive-level<\u002Fdiv>\n        <div style=\"font-size:32px;font-weight:800;line-height:1.04;letter-spacing:-.02em\">We start where the work <span style=\"border-bottom:3px solid #fff\">actually happens.<\u002Fspan><\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- 3-WEEK PROCESS MAP -->\n  <section style=\"max-width:1280px;margin:84px auto 0;padding:0 22px;animation:rise .8s cubic-bezier(.2,.7,.2,1) both\">\n    <div style=\"font-size:12px;letter-spacing:.16em;text-transform:uppercase;color:var(--orange);font-weight:700;margin-bottom:16px\">The process<\u002Fdiv>\n    <h2 style=\"font-size:34px;line-height:1.04;letter-spacing:-.02em;margin:0 0 30px;font-weight:800;text-transform:uppercase\">Three weeks. Discovery to roadmap.<\u002Fh2>\n    <div style=\"position:relative;display:grid;grid-temp
