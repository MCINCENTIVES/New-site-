  <script>
    
document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

<\u002Fdiv>\n        <a href=\"Book%20a%20Workforce%20Review.bundled.html\" style=\"display:inline-flex;align-items:center;gap:8px;background:var(--orange);color:#fff;text-decoration:none;font-size:13.5px;font-weight:700;padding:11px 20px;border-radius:999px\">Book a call<\u002Fa>\n      <\u002Fnav>\n      <div style=\"position:relative;z-index:4;padding:48px 36px 56px;max-width:60ch\">\n        <div style=\"font-size:12px;letter-spacing:.16em;text-transform:uppercase;color:var(--orange);font-weight:700;margin-bottom:18px\">Start the conversation<\u002Fdiv>\n        <h1 style=\"font-size:58px;line-height:.97;letter-spacing:-.03em;margin:0 0 20px;font-weight:800;text-transform:uppercase\">Let's make performance <span style=\"color:var(--ghost)\">a system.<\u002Fspan><\u002Fh1>\n        <p style=\"font-size:17.5px;line-height:1.6;color:var(--soft);max-width:50ch;margin:0\">Two ways to begin. Choose the one that fits where you are — we'll take it from there.<\u002Fp>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- TWO PATHS -->\n  <section style=\"max-width:1280px;margin:64px auto 0;padding:0 22px;animation:rise .8s cubic-bezier(.2,.7,.2,1) both\">\n    <div style=\"display:grid;grid-template-columns:1fr 1fr;gap:16px\">\n      <button type=\"button\" onclick=\"{{ pickDiagnostic }}\" style=\"text-align:left;cursor:pointer;font-family:inherit;background:{{ diagBg }};color:{{ diagFg }};border:2px solid {{ diagBorder }};border-radius:var(--r);padding:36px 34px;transition:transform .25s ease,border-color .25s ease\" style-hover=\"transform:translateY(-4px)\">\n        <div style=\"display:flex;align-items:center;justify-content:space-between;margin-bottom:18px\">\n          <span style=\"font-size:11px;letter-spacing:.12em;text-transform:uppercase;font-weight:700;color:{{ diagTag }}\">Recommended<\u002Fspan>\n          <span style=\"width:24px;height:24px;border-radius:999px;border:2px solid {{ diagDot }};display:flex;align-items:center;justify-content:center\"><span style=\"width:11px;height:11px;border-radius:999px;background:{{ diagDotFill }}\"><\u002Fspan><\u002Fspan>\n        <\u002Fdiv>\n        <h2 style=\"font-size:24px;margin:0 0 10px;font-weight:800;text-transform:uppercase;letter-spacing:-.015em\">Book a Strategy Diagnostic<\u002Fh2>\n        <p style=\"font-size:14.5px;line-height:1.55;margin:0;opacity:.78\">A deep audit of your performance systems with an insight report and prioritised roadmap. From $3,500 + GST — fully credited if you proceed.<\u002Fp>\n      <\u002Fbutton>\n      <button type=\"button\" onclick=\"{{ pickConsult }}\" style=\"text-align:left;cursor:pointer;font-family:inherit;background:{{ consBg }};color:{{ consFg }};border:2px solid {{ consBorder }};border-radius:var(--r);padding:36px 34px;transition:transform .25s ease,border-color .25s ease\" style-hover=\"transform:translateY(-4px)\">\n        <div style=\"display:flex;align-items:center;justify-content:space-between;margin-bottom:18px\">\n          <span style=\"font-size:11px;letter-spacing:.12em;text-transform:uppercase;font-weight:700;color:{{ consTag }}\">No obligation<\u002Fspan>\n          <span style=\"width:24px;height:24px;border-radius:999px;border:2px solid {{ consDot }};display:flex;align-items:center;justify-content:center\"><span style=\"width:11px;height:11px;border-radius:999px;background:{{ consDotFill }}\"><\u002Fspan><\u002Fspan>\n        <\u002Fdiv>\n        <h2 style=\"font-size:24px;margin:0 0 10px;font-weight:800;text-transform:uppercase;letter-spacing:-.015em\">30-minute consultation<\u002Fh2>\n        <p style=\"font-size:14.5px;line-height:1.55;margin:0;opacity:.78\">A complimentary conversation with a senior consultant to discuss your priorities and the right starting point.<\u002Fp>\n      <\u002Fbutton>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- IMAGE BAND -->\n  <section style=\"max-width:1280px;margin:16px auto 0;padding:0 22px;animation:rise .8s cubic-bezier(.2,.7,.2,1) both\">\n    <div style=\"position:relative;height:320px;border-radius:30px;overflow:hidden;background:var(--peach)\">\n      <img src=\"7524afa7-ccea-4384-bc34-754ae939cc2c\" alt=\"\" style=\"position:absolute;inset:0;width:100%;height:100%;object-fit:cover\">\n      <div style=\"position:absolute;inset:0;background:linear-gradient(110deg,rgba(18,12,8,.58),rgba(18,12,8,.1) 60%,transparent);z-index:2\"><\u002Fdiv>\n      <div style=\"position:absolute;left:40px;bottom:34px;z-index:3;color:#fff;max-width:34ch\">\n        <div style=\"font-size:11px;letter-spacing:.16em;text-transform:uppercase;font-weight:700;opacity:.85;margin-bottom:10px\">A senior consultant, one conversation<\u002Fdiv>\n        <div style=\"font-size:28px;font-weight:800;line-height:1.05;letter-spacing:-.02em\">No pitch. A working <span style=\"border-bottom:3px solid #fff\">conversation.<\u002Fspan><\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- FORM -->\n  <section style=\"max-width:1280px;margin:16px auto 0;padding:0 22px;animation:rise .8s cubic-bezier(.2,.7,.2,1) both\">\n    <div style=\"display:grid;grid-template-columns:1.3fr .7fr;gap:16px;align-items:stretch\">\n      <div style=\"background:var(--blush);border-radius:var(--r);padding:40px 38px\">\n        <h3 style=\"font-size:13px;letter-spacing:.12em;text-transform:uppercase;color:var(--orange);font-weight:700;margin:0 0 4px\">You're requesting<\u002Fh3>\n        <div style=\"font-size:24px;font-weight:800;text-transform:uppercase;letter-spacing:-.015em;margin-bottom:24px\">{{ selectedLabel }}<\u002Fdiv>\n        <div style=\"display:grid;grid-template-columns:1fr 1fr;gap:14px\">\n          <input class=\"mc-field\" type=\"text\" placeholder=\"Full name\">\n          <input class=\"mc-field\" type=\"text\" placeholder=\"Role / title\">\n          <input class=\"mc-field\" type=\"text\" placeholder=\"Organisation\">\n          <input class=\"mc-field\" type=\"text\" placeholder=\"Team size\">\n          <input class=\"mc-field\" type=\"email\" placeholder=\"Work email\" style=\"grid-column:span 2\">\n          <textarea class=\"mc-field\" placeholder=\"What are you trying to solve?\" rows=\"4\" style=\"grid-column:span 2;resize:vertical\"><\u002Ftextarea>\n        <\u002Fdiv>\n        <button type=\"button\" onclick=\"{{ submit }}\" style=\"margin-top:18px;cursor:pointer;font-family:inherit;width:100%;background:var(--orange);color:#fff;border:none;font-weight:700;font-size:15px;padding:16px;border-radius:999px\">{{ submitLabel }}<\u002Fbutton>\n        <sc-if value=\"{{ sent }}\" hint-placeholder-val=\"{{ false }}\">\n          <div style=\"margin-top:14px;font-size:13.5px;color:var(--ink);background:#fff;border-radius:12px;padding:13px 16px\">Thanks — we'll be in touch within one business day to confirm your {{ selectedShort }}.<\u002Fdiv>\n        <\u002Fsc-if>\n        <div style=\"margin-top:14px;font-size:12.5px;color:var(--soft)\">Prefer email? Reach us directly at <strong style=\"color:var(--ink)\">contact@mcincentives.com.au<\u002Fstrong><\u002Fdiv>\n      <\u002Fdiv>\n      <div style=\"background:var(--ink);color:#fff;border-radius:var(--r);padding:38px 34px;display:flex;flex-direction:column;justify-content:space-between\">\n        <div>\n          <div style=\"font-size:11px;letter-spacing:.12em;text-transform:uppercase;color:var(--peach);font-weight:700;margin-bottom:18px\">What happens next<\u002Fdiv>\n          <div style=\"display:flex;flex-direction:column;gap:18px\">\n            <sc-for list=\"{{ steps }}\" as=\"s\" hint-placeholder-count=\"3\">\n              <div style=\"display:flex;gap:14px;align-items:flex-start\">\n                <span style=\"flex:none;width:30px;height:30px;border-radius:999px;background:var(--orange);display:flex;align-items:center;justify-content:center;font-weight:800;font-size:13px\">{{ s.n }}<\u002Fspan>\n                <div>\n                  <div style=\"font-size:15px;font-weight:700;margin-bottom:2px\">{{ s.t }}<\u002Fdiv>\n                  <div style=\"font-size:13px;line-height:1.45;color:rgba(255,255,255,.6)\">{{ s.d }}<\u002Fdiv>\n                <\u002Fdiv>\n              <\u002Fdiv>\n            <\u002Fsc-for>\n          <\u002Fdiv>\n        <\u002Fdiv>\n        <div style=\"margin-top:26px;padding-top:22px;border-top:1px solid rgba(255,255,255,.14);font-size:13px;color:rgba(255,255,255,.6)\">Sydney, Australia · Working with teams nationally<\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- FOOTER -->\n  <footer style=\"max-width:1280px;margin:54px auto 22px;padding:0 22px\">\n    <div style=\"background:var(--ink);color:#fff;border-radius:34px;padding:54px 48px\">\n      <div style=\"display:grid;grid-template-columns:1.6fr 1fr 1fr 1fr;gap:30px\">\n        <div>\n          <img src=\"95c643ae-8448-47aa-a8ae-7716f7b2783c\" alt=\"MC Incentives\" style=\"height:46px;width:auto;display:block;margin-bottom:16px;filter:brightness(0) invert(1)\">\n          <p style=\"font-size:13.5px;line-height:1.6;color:rgba(255,255,255,.6);max-width:34ch;margin:0\">Strategic Workforce Performance consultancy. We design the connected systems of reward, recognition, performance and workforce for the AI era.<\u002Fp>\n        <\u002Fdiv>\n        <div>\n          <div style=\"font-size:11px;letter-spacing:.12em;text-transform:uppercase;color:rgba(255,255,255,.5);margin-bottom:14px;font-weight:700\">Explore<\u002Fdiv>\n          <div style=\"display:flex;flex-direction:column;gap:9px;font-size:14px\"><a href=\"What%20We%20Do.bundled.html\" style=\"color:#fff;text-decoration:none\">What we do<\u002Fa><a href=\"Strategy%20Diagnostic.bundled.html\" style=\"color:#fff;text-decoration:none\">Strategy Diagnostic<\u002Fa><a href=\"Rollout.bundled.html\" style=\"color:#fff;text-decoration:none\">Performance System Rollout<\u002Fa><a href=\"Insights.bundled.html\" style=\"color:#fff;text-decoration:none\">Insights<\u002Fa><\u002Fdiv>\n        <\u002Fdiv>\n        <div>\n          <div style=\"font-size:11px;letter-spacing:.12em;text-transform:uppercase;color:rgba(255,255,255,.5);margin-bottom:14px;font-weight:700\">Company<\u002Fdiv>\n          <div style=\"display:flex;flex-direction:column;gap:9px;font-size:14px\"><a href=\"Who%20We%20Work%20With.bundled.html\" style=\"color:#fff;text-decoration:none\">Who we work with<\u002Fa><a href=\"About.bundled.html\" style=\"color:#fff;text-decoration:none\">About<\u002Fa><a href=\"Contact.bundled.html\" style=\"color:#fff;text-decoration:none\">Contact<\u002Fa><\u002Fdiv>\n        <\u002Fdiv>\n        <div>\n          <div style=\"font-size:11px;letter-spacing:.12em;text-transform:uppercase;color:rgba(255,255,255,.5);margin-bottom:14px;font-weight:700\">Get in touch<\u002Fdiv>\n          <div style=\"display:flex;flex-direction:column;gap:9px;font-size:14px;color:rgba(255,255,255,.6)\"><span>contact@mcincentives.com.au<\u002Fspan><span>Sydney, Australia<\u002Fspan><\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n      <div style=\"margin-top:40px;font-size:12.5px;color:rgba(255,255,255,.45)\">© 2026 MC Incentives · Reward · Recognition · Performance · Workforce<\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Ffooter>\n\n<\u002Fdiv>\n<\u002Fx-dc>\n<script type=\"text/x-dc\" data-dc-script=\"\">\nclass Component extends DCLogic {\n  state = { choice: 'diagnostic', sent: false };\n\n  renderVals() {\n    const s = this.state;\n    const isDiag = s.choice === 'diagnostic';\n    const sel = (on) => ({\n      bg: on ? 'var(--ink)' : '#fff',\n      fg: on ? '#fff' : 'var(--ink)',\n      border: on ? 'var(--ink)' : 'var(--line)',\n      tag: on ? 'var(--peach)' : 'var(--orange)',\n      dot: on ? 'var(--orange)' : 'var(--line)',\n      dotFill: on ? 'var(--orange)' : 'transparent'\n    });\n    const d = sel(isDiag), c = sel(!isDiag);\n    return {\n      pickDiagnostic: () => this.setState({ choice: 'diagnostic', sent: false }),\n      pickConsult: () => this.setState({ choice: 'consult', sent: false }),\n      submit: () => this.setState({ sent: true }),\n      sent: s.sent,\n      selectedLabel: isDiag ? 'Strategy Diagnostic' : '30-minute consultation',\n      selectedShort: isDiag ? 'diagnostic' : 'consultation',\n      submitLabel: isDiag ? 'Request your diagnostic' : 'Request your consultation',\n      diagBg: d.bg, diagFg: d.fg, diagBorder: d.border, diagTag: d.tag, diagDot: d.dot, diagDotFill: d.dotFill,\n      consBg: c.bg, consFg: c.fg, consBorder: c.border, consTag: c.tag, consDot: c.dot, consDotFill: c.dotFill,\n      steps: [\n        { n: '1', t: 'We confirm within a day', d: 'A senior consultant reviews your note and replies within one business day.' },\n        { n: '2', t: 'We scope the fit', d: 'A short call to confirm scope, timing and the right starting point.' },\n        { n: '3', t: 'We begin', d: 'Diagnostic kicks off, or we book your complimentary consultation.' }\n      ]\n    };\n  }\n}\n<\u002Fscript>\n\n\n<\u002Fbody><\u002Fhtml>"
