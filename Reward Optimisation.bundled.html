document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

px;background:var(--orange);color:#fff;text-decoration:none;font-size:13.5px;font-weight:700;padding:11px 20px;border-radius:999px\">Book a call<\u002Fa>\n      <\u002Fnav>\n      <div style=\"position:relative;z-index:4;display:grid;grid-template-columns:1.22fr .78fr;gap:38px;align-items:center;padding:44px 36px 50px\">\n        <div>\n          <div style=\"font-size:12px;letter-spacing:.16em;text-transform:uppercase;color:var(--orange);font-weight:700;margin-bottom:18px\">Consulting Services · Reward Optimisation<\u002Fdiv>\n          <h1 style=\"font-size:50px;line-height:.98;letter-spacing:-.03em;margin:0 0 20px;font-weight:800;text-transform:uppercase\">Make every reward <span style=\"color:var(--ghost)\">dollar work harder.<\u002Fspan><\u002Fh1>\n          <p style=\"font-size:16.5px;line-height:1.6;color:var(--soft);max-width:52ch;margin:0\">Most organisations spend heavily on reward without a clear view of what it returns. We turn reward from a cost line into a measurable driver of behaviour, performance and retention.<\u002Fp>\n        <\u002Fdiv>\n        <div style=\"background:var(--ink);color:#fff;border-radius:24px;padding:32px 30px\">\n          <div style=\"font-size:11px;letter-spacing:.14em;text-transform:uppercase;color:var(--peach);font-weight:700;margin-bottom:16px\">Why it matters<\u002Fdiv>\n          <div style=\"font-size:19px;line-height:1.3;font-weight:700;letter-spacing:-.01em;margin-bottom:18px\">Reward is one of the largest investments a business makes — and one of the least measured.<\u002Fdiv>\n          <div style=\"height:1px;background:rgba(255,255,255,.14);margin-bottom:16px\"><\u002Fdiv>\n          <div style=\"display:flex;flex-direction:column;gap:11px\">\n            <div style=\"display:flex;align-items:center;gap:11px;font-size:14px;font-weight:600;color:rgba(255,255,255,.85)\"><span style=\"width:7px;height:7px;border-radius:999px;background:var(--orange)\"><\u002Fspan>A clear view of reward ROI<\u002Fdiv>\n            <div style=\"display:flex;align-items:center;gap:11px;font-size:14px;font-weight:600;color:rgba(255,255,255,.85)\"><span style=\"width:7px;height:7px;border-radius:999px;background:var(--orange)\"><\u002Fspan>Less waste, more impact<\u002Fdiv>\n            <div style=\"display:flex;align-items:center;gap:11px;font-size:14px;font-weight:600;color:rgba(255,255,255,.85)\"><span style=\"width:7px;height:7px;border-radius:999px;background:var(--orange)\"><\u002Fspan>Governed, consistent, defensible<\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- INTRO -->\n  <section style=\"max-width:1280px;margin:80px auto 0;padding:0 22px;animation:rise .8s cubic-bezier(.2,.7,.2,1) both\">\n    <div style=\"display:grid;grid-template-columns:.9fr 1.1fr;gap:46px;align-items:center\">\n      <h2 style=\"font-size:32px;line-height:1.04;letter-spacing:-.02em;margin:0;font-weight:800;text-transform:uppercase\">Reward spend should <span style=\"color:var(--ghost)\">return more than goodwill.<\u002Fspan><\u002Fh2>\n      <p style=\"font-size:16.5px;line-height:1.62;color:var(--soft);margin:0\">Without a strategy, reward drifts — programs accumulate, value is unclear and spend stops correlating with outcomes. We audit, focus and optimise so every dollar reinforces the behaviours that matter.<\u002Fp>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n<!-- IMAGE BAND -->\n  <section style=\"max-width:1280px;margin:64px auto 0;padding:0 22px;animation:rise .8s cubic-bezier(.2,.7,.2,1) both\">\n    <div style=\"position:relative;height:380px;border-radius:34px;overflow:hidden;background:var(--peach)\">\n      <img src=\"5f0f03f5-082b-426a-b0f5-7f3c058bd439\" alt=\"\" style=\"position:absolute;inset:0;width:100%;height:100%;object-fit:cover\">\n      <div style=\"position:absolute;inset:0;background:linear-gradient(110deg,rgba(18,12,8,.62),rgba(18,12,8,.12) 60%,transparent);z-index:2\"><\u002Fdiv>\n      <div style=\"position:absolute;left: .style.transform='';this.style.boxShadow=''\">\n        <div style=\"display:flex;align-items:center;gap:11px;margin-bottom:14px\"><span style=\"width:30px;height:30px;border-radius:9px;background:var(--blush);color:var(--orange);display:flex;align-items:center;justify-content:center;font-weight:800;font-size:13px\">04<\u002Fspan><\u002Fdiv>\n        <h3 style=\"font-size:18px;line-height:1.18;margin:0 0 8px;font-weight:700;letter-spacing:-.01em\">Reward Communication<\u002Fh3>\n        <p style=\"font-size:14px;line-height:1.5;color:var(--soft);margin:0\">Make sure people understand — and value — what they receive.<\u002Fp>\n      <\u002Fdiv>\n      <div style=\"background:#fff;border:1px solid var(--line);border-radius:var(--rsm);padding:28px 26px;transition:transform .25s ease,box-shadow .25s ease\" onmouseover=\"this.style.transform='translateY(-4px)';this.style.boxShadow='0 24px 44px -30px rgba(35,34,34,.45)'\" onmouseout=\"this.style.transform='';this.style.boxShadow=''\">\n        <div style=\"display:flex;align-items:center;gap:11px;margin-bottom:14px\"><span style=\"width:30px;height:30px;border-radius:9px;background:var(--blush);color:var(--orange);display:flex;align-items:center;justify-content:center;font-weight:800;font-size:13px\">05<\u002Fspan><\u002Fdiv>\n        <h3 style=\"font-size:18px;line-height:1.18;margin:0 0 8px;font-weight:700;letter-spacing:-.01em\">Reward Governance &amp; Policy Reviews<\u002Fh3>\n        <p style=\"font-size:14px;line-height:1.5;color:var(--soft);margin:0\">Keep reward consistent, compliant and defensible.<\u002Fp>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- OUTCOMES -->\n  <section style=\"max-width:1280px;margin:84px auto 0;padding:0 22px;animation:rise .8s cubic-bezier(.2,.7,.2,1) both\">\n    <div style=\"text-align:center;max-width:54ch;margin:0 auto 28px\">\n      <div style=\"font-size:12px;letter-spacing:.16em;text-transform:uppercase;color:var(--orange);font-weight:700;margin-bottom:14px\">B
