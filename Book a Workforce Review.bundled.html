document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

nt:center;font-weight:800;font-size:13px\">2<\u002Fspan>\n      <h2 style=\"font-size:22px;font-weight:800;text-transform:uppercase;letter-spacing:-.015em;margin:0\">Pick a time<\u002Fh2>\n    <\u002Fdiv>\n    <div style=\"display:grid;grid-template-columns:1.35fr .65fr;gap:16px;align-items:stretch\">\n\n      <!-- calendar + slots -->\n      <div style=\"background:#fff;border:1px solid var(--line);border-radius:var(--r);padding:30px 32px\">\n        <div style=\"display:grid;grid-template-columns:1.15fr .85fr;gap:34px\">\n          <!-- month grid -->\n          <div>\n            <div style=\"display:flex;align-items:center;justify-content:space-between;margin-bottom:18px\">\n              <span style=\"font-size:17px;font-weight:800;letter-spacing:-.01em\">{{ monthName }}<\u002Fspan>\n              <div style=\"display:flex;align-items:center;gap:8px\">\n                <button type=\"button\" onclick=\"{{ prevMonth }}\" aria-label=\"Previous month\" style=\"width:30px;height:30px;border-radius:999px;border:1px solid var(--line);background:#fff;cursor:{{ prevCursor }};display:flex;align-items:center;justify-content:center;color:{{ prevColor }}\">\n                  <svg width=\"13\" height=\"13\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2.5\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><path d=\"M15 18l-6-6 6-6\"><\u002Fpath><\u002Fsvg>\n                <\u002Fbutton>\n                <button type=\"button\" onclick=\"{{ nextMonth }}\" aria-label=\"Next month\" style=\"width:30px;height:30px;border-radius:999px;border:1px solid var(--line);background:#fff;cursor:pointer;display:flex;align-items:center;justify-content:center;color:var(--ink)\">\n                  <svg width=\"13\" height=\"13\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2.5\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><path d=\"M9 18l6-6-6-6\"><\u002Fpath><\u002Fsvg>\n                <\u002Fbutton>\n              <\u002Fdiv>\n            <\u002Fdiv>\n            <div style=\"display:grid;grid-template-columns:repeat(7,1fr);gap:5px;margin-bottom:8px\">\n              <sc-for list=\"{{ dayHeaders }}\" as=\"d\" hint-placeholder-count=\"7\">\n                <div style=\"text-align:center;font-size:11px;font-weight:700;color:var(--soft);text-transform:uppercase;letter-spacing:.04em\">{{ d }}<\u002Fdiv>\n              <\u002Fsc-for>\n            <\u002Fdiv>\n            <div style=\"display:grid;grid-template-columns:repeat(7,1fr);gap:5px\">\n              <sc-for list=\"{{ cells }}\" as=\"c\" hint-placeholder-count=\"35\">\n                <button type=\"button\" onclick=\"{{ c.onPick }}\" style=\"aspect-ratio:1;border:none;cursor:{{ c.cursor }};font-family:inherit;font-size:14px;font-weight:600;border-radius:11px;background:{{ c.bg }};color:{{ c.fg }};display:flex;align-items:center;justify-content:center\">{{ c.day }}<\u002Fbutton>\n              <\u002Fsc-for>\n            <\u002Fdiv>\n          <\u002Fdiv>\n          <!-- time slots -->\n          <div style=\"border-left:1px solid var(--line);padding-left:30px\">\n            <div style=\"font-size:13px;font-weight:700;text-transform:uppercase;letter-spacing:.04em;color:var(--soft);margin-bottom:14px\">{{ slotsLabel }}<\u002Fdiv>\n            <sc-if value=\"{{ dateChosen }}\" hint-placeholder-val=\"{{ true }}\">\n              <div style=\"display:flex;flex-direction:column;gap:8px\">\n                <sc-for list=\"{{ slots }}\" as=\"t\" hint-placeholder-count=\"6\">\n                  <button type=\"button\" onclick=\"{{ t.onPick }}\" style=\"cursor:pointer;font-family:inherit;font-size:14px;font-weight:600;padding:12px;border-radius:11px;border:1px solid {{ t.border }};background:{{ t.bg }};color:{{ t.fg }}\">{{ t.label }}<\u002Fbutton>\n                <\u002Fsc-for>\n              <\u002Fdiv>\n            <\u002Fsc-if>\n            <sc-if value=\"{{ noDateYet }}\" hint-placeholder-val=\"{{ false }}\">\n              <p style=\"font-size:13.5px;line-height:1.5;color:var(--soft);margin:0\">Select a date to see available times.<\u002Fp>\n            <\u002Fsc-if>\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n\n      <!-- summary panel -->\n      <div style=\"background:var(--ink);color:#fff;border-radius:var(--r);padding:34px 32px;display:flex;flex-direction:column\">\n        <div style=\"font-size:11px;letter-spacing:.12em;text-transform:uppercase;color:var(--peach);font-weight:700;margin-bottom:18px\">Your booking<\u002Fdiv>\n        <div style=\"display:flex;flex-direction:column;gap:14px;margin-bottom:24px\">\n          <div>\n            <div style=\"font-size:12px;color:rgba(255,255,255,.5);margin-bottom:3px\">Call type<\u002Fdiv>\n            <div style=\"font-size:15.5px;font-weight:700\">{{ summaryType }}<\u002Fdiv>\n          <\u002Fdiv>\n          <div>\n            <div style=\"font-size:12px;color:rgba(255,255,255,.5);margin-bottom:3px\">Date &amp; time<\u002Fdiv>\n            <div style=\"font-size:15.5px;font-weight:700\">{{ summaryWhen }}<\u002Fdiv>\n          <\u002Fdiv>\n          <div>\n            <div style=\"font-size:12px;color:rgba(255,255,255,.5);margin-bottom:3px\">Duration<\u002Fdiv>\n            <div style=\"font-size:15.5px;font-weight:700\">{{ summaryDuration }}<\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n        <div style=\"display:flex;flex-direction:column;gap:9px;margin-bottom:12px\">\n          <input class=\"mc-field\" type=\"text\" placeholder=\"Full name\">\n          <input class=\"mc-field\" type=\"text\" placeholder=\"Company\">\n          <input class=\"mc-field\" type=\"tel\" placeholder=\"Phone number\">\n          <input class=\"mc-field\" type=\"email\" placeholder=\"Work email\">\n        <\u002Fdiv>\n        <button type=\"button\" onclick=\"{{ confirm }}\" style=\"cursor:{{ confirmCursor }};font-family:inherit;width:100%;background:{{ confirmBg }};color:#fff;border:none;font-weight:700;font-size:15px;padding:16px;border-radius:999px\">{{ confirmLabel }}<\u002Fbutton>\n        <sc-if value=\"{{ booked }}\" hint-placeholder-val=\"{{ false }}\">\n          <div style=\"margin-top:14px;font-size:13.5px;line-height:1.5;color:#fff;background:rgba(255,85,34,.18);border:1px solid rgba(255,85,34,.4);border-radius:12px;padding:13px 16px\">{{ bookedMsg }}<\u002Fdiv>\n        <\u002Fsc-if>\n        <div style=\"margin-top:auto;padding-top:22px;font-size:12.5px;color:rgba(255,255,255,.5)\">Prefer email? <strong style=\"color:#fff\">contact@mcincentives.com.au<\u002Fstrong><\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- FOOTER -->\n  <footer style=\"max-width:1280px;margin:54px auto 22px;padding:0 22px\">\n    <div style=\"background:var(--ink);color:#fff;border-radius:34px;padding:54px 48px\">\n      <div style=\"display:grid;grid-template-columns:1.6fr 1fr 1fr 1fr;gap:30px\">\n        <div>\n          <img src=\"15603b6b-d463-41fe-9328-146b76fd2231\" alt=\"MC Incentives\" style=\"height:46px;width:auto;display:block;margin-bottom:16px;filter:brightness(0) invert(1)\">\n          <p style=\"font-size:13.5px;line-height:1.6;color:rgba(255,255,255,.6);max-width:34ch;margin:0\">Strategic Workforce Performance consultancy. We design the connected systems of reward, recognition, performance and workforce for the AI era.<\u002Fp>\n        <\u002Fdiv>\n        <div>\n          <div style=\"font-size:11px;letter-spacing:.12em;text-transform:uppercase;color:rgba(255,255,255,.5);margin-bottom:14px;font-weight:700\">Offers<\u002Fdiv>\n          <div style=\"display:flex;flex-direction:column;gap:9px;font-size:14px\"><a href=\"Strategy%20Diagnostic.bundled.html\" style=\"color:#fff;text-decoration:none\">Strategy Diagnostic<\u002Fa><a href=\"Rollout.bundled.html\" style=\"color:#fff;text-decoration:none\">Performance System Rollout<\u002Fa><a href=\"What%20We%20Do.bundled.html\" style=\"color:#fff;text-decoration:none\">What we do<\u002Fa><\u002Fdiv>\n        <\u002Fdiv>\n        <div>\n          <div style=\"font-size:11px;letter-spacing:.12em;text-transform:uppercase;color:rgba(255,255,255,.5);margin-bottom:14px;font-weight:700\">Company<\u002Fdiv>\n          <div style=\"display:flex;flex-direction:column;gap:9px;font-size:14px\"><a href=\"Insights.bundled.html\" style=\"color:#fff;text-decoration:none\">Insights<\u002Fa><a href=\"Who%20We%20Work%20With.bundled.html\" style=\"color:#fff;text-decoration:none\">Who we work with<\u002Fa><a href=\"About.bundled.html\" style=\"color:#fff;text-decoration:none\">About<\u002Fa><\u002Fdiv>\n        <\u002Fdiv>\n        <div>\n          <div style=\"font-size:11px;letter-spacing:.12em;text-transform:uppercase;color:rgba(255,255,255,.5);margin-bottom:14px;font-weight:700\">Get in touch<\u002Fdiv>\n          <div style=\"display:flex;flex-direction:column;gap:9px;font-size:14px;color:rgba(255,255,255,.6)\"><span>contact@mcincentives.com.au<\u002Fspan><span>Sydney, Australia<\u002Fspan><\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n      <div style=\"margin-top:40px;font-size:12.5px;color:rgba(255,255,255,.45)\">© 2026 MC Incentives · Reward · Recognition · Performance · Workforce<\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Ffooter>\n\n<\u002Fdiv>\n<\u002Fx-dc>\n<script type=\"text/x-dc\" data-dc-script=\"\">\nclass Component extends DCLogic {\n  state = { choice: 'consult', selDate: null, selTime: null, booked: false, monthOffset: 0 };\n\n  monthMeta() {\n    const now = new Date();\n    const base = new Date(now.getFullYear(), now.getMonth() + this.state.monthOffset, 1);\n    const y = base.getFullYear(), m = base.getMonth();\n    return {\n      y, m,\n      isCurrent: this.state.monthOffset === 0,\n      today: now.getDate(),\n      monthName: base.toLocaleString('en-US', { month: 'long', year: 'numeric' }),\n      first: new Date(y, m, 1).getDay(),\n      days: new Date(y, m + 1, 0).getDate()\n    };\n  }\n\n  renderVals() {\n    const s = this.state, R = React;\n    const isCons = s.choice === 'consult';\n\n    const sel = (on) => ({\n      bg: on ? 'var(--ink)' : '#fff', fg: on ? '#fff' : 'var(--ink)',\n      border: on ? 'var(--ink)' : 'var(--line)', tag: on ? 'var(--peach)' : 'var(--orange)',\n      dot: on ? 'var(--orange)' : 'var(--line)', dotFill: on ? 'var(--orange)' : 'transparent'\n    });\n    const cs = sel(isCons), ds = sel(!isCons);\n\n    const mm = this.monthMeta();\n    const cells = [];\n    for (let i = 0; i < mm.first; i++) cells.push({ key: 'b' + i, day: '', bg: 'transparent', fg: 'transparent', cursor: 'default', onPick: () => {} });\n    for (let d = 1; d <= mm.days; d++) {\n      const dow = new Date(mm.y, mm.m, d).getDay();\n      const weekend = dow === 0 || dow === 6;\n      const selectable = (!mm.isCurrent || d >= mm.today) && !weekend;\n      const isSel = s.selDate === d;\n      cells.push({\n        key: 'd' + d, day: d,\n        bg: isSel ? 'var(--orange)' : (selectable ? 'var(--blush)' : 'transparent'),\n        fg: isSel ? '#fff' : (selectable ? 'var(--ink)' : 'var(--ghost)'),\n        cursor: selectable ? 'pointer' : 'default',\n        onPick: selectable ? () => this.setState({ selDate: d, selTime: null, booked: false }) : () => {}\n      });\n    }\n\n    const slotTimes = ['3:00 PM', '3:30 PM', '4:00 PM', '4:30 PM', '5:00 PM', '5:30 PM', '6:00 PM', '6:30 PM'];\n    const slots = slotTimes.map(t => {\n      const on = s.selTime === t;\n      return {\n        label: t, bg: on ? 'var(--orange)' : '#fff', fg: on ? '#fff' : 'var(--ink)',\n        border: on ? 'var(--orange)' : 'var(--line)',\n        onPick: () => this.setState({ selTime: t, booked: false })\n      };\n    });\n\n    const monthShort = new Date(mm.y, mm.m, 1).toLocaleString('en-US', { month: 'short' });\n    const dateChosen = s.selDate != null;\n    const whenStr = dateChosen ? (monthShort + ' ' + s.selDate + (s.selTime ? ' · ' + s.selTime : '')) : '—';\n    const typeStr = isCons ? '30-minute consultation' : 'Strategy Diagnostic call';\n    const ready = dateChosen && s.selTime;\n\n    return {\n      pickConsult: () => this.setState({ choice: 'consult', booked: false }),\n      pickDiagnostic: () => this.setState({ choice: 'diagnostic', booked: false }),\n      consBg: cs.bg, consFg: cs.fg, consBorder: cs.border, consTag: cs.tag, consDot: cs.dot, consDotFill: cs.dotFill,\n      diagBg: ds.bg, diagFg: ds.fg, diagBorder: ds.border, diagTag: ds.tag, diagDot: ds.dot, diagDotFill: ds.dotFill,\n      monthName: mm.monthName,\n      canPrev: !mm.isCurrent,\n      prevMonth: () => { if (this.state.monthOffset > 0) this.setState({ monthOffset: this.state.monthOffset - 1, selDate: null, selTime: null, booked: false }); },\n      nextMonth: () => { if (this.state.monthOffset < 6) this.setState({ monthOffset: this.state.monthOffset + 1, selDate: null, selTime: null, booked: false }); },\n      prevColor: mm.isCurrent ? 'var(--ghost)' : 'var(--ink)',\n      prevCursor: mm.isCurrent ? 'not-allowed' : 'pointer',\n      dayHeaders: ['Sun', 'Mon', 'Tue', 'Wed', 'Thu', 'Fri', 'Sat'],\n      cells,\n      slots, slotsLabel: dateChosen ? 'Available times' : 'Select a date',\n      dateChosen, noDateYet: !dateChosen,\n      summaryType: typeStr,\n      summaryWhen: whenStr,\n      summaryDuration: isCons ? '30 minutes · video or phone' : '45 minutes · scoping call',\n      confirm: () => { if (ready) this.setState({ booked: true }); },\n      confirmCursor: ready ? 'pointer' : 'not-allowed',\n      confirmBg: ready ? 'var(--orange)' : 'rgba(255,255,255,.18)',\n      confirmLabel: s.booked ? 'Booked ✓' : 'Confirm booking',\n      booked: s.booked,\n      bookedMsg: 'Thanks — your ' + typeStr.toLowerCase() + ' is requested for ' + whenStr + '. We\\u2019ll email a calendar invite within one business day.'\n    };\n  }\n}\n<\u002Fscript>\n\n\n<\u002Fbody><\u002Fhtml>"
  </script>
</body>
