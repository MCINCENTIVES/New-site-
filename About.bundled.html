document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

a href=\"Total%20Reward.bundled.html\" style=\"display:block;text-decoration:none;color:var(--soft);font-size:13px;font-weight:600;padding:5px 0;transition:color .2s ease\" onmouseover=\"this.style.color='var(--ink)'\" onmouseout=\"this.style.color='var(--soft)'\">Employee Benefits Strategy<\u002Fa><a href=\"Total%20Reward.bundled.html\" style=\"display:block;text-decoration:none;color:var(--soft);font-size:13px;font-weight:600;padding:5px 0;transition:color .2s ease\" onmouseover=\"this.style.color='var(--ink)'\" onmouseout=\"this.style.color='var(--soft)'\">Recognition Programs<\u002Fa><a href=\"Total%20Reward.bundled.html\" style=\"display:block;text-decoration:none;color:var(--soft);font-size:13px;font-weight:600;padding:5px 0;transition:color .2s ease\" onmouseover=\"this.style.color='var(--ink)'\" onmouseout=\"this.style.color='var(--soft)'\">Wellbeing &amp; Lifestyle<\u002Fa><a href=\"Total%20Reward.bundled.html\" style=\"display:block;text-decoration:none;color:var(--soft);font-size:13px;font-weight:600;padding:5px 0;transition:color .2s ease\" onmouseover=\"this.style.color='var(--ink)'\" onmouseout=\"this.style.color='var(--soft)'\">Flexible Work &amp; Reward<\u002Fa><\u002Fdiv><div><a href=\"Performance%20Incentive%20Design.bundled.html\" style=\"display:block;text-decoration:none;color:var(--orange);font-size:13.5px;font-weight:800;text-transform:uppercase;letter-spacing:.02em;margin-bottom:12px;padding-bottom:10px;border-bottom:1px solid var(--line)\">Performance &amp; Incentives<\u002Fa><a href=\"Performance%20Incentive%20Design.bundled.html\" style=\"display:block;text-decoration:none;color:var(--soft);font-size:13px;font-weight:600;padding:5px 0;transition:color .2s ease\" onmouseover=\"this.style.color='var(--ink)'\" onmouseout=\"this.style.color='var(--soft)'\">Bonus Scheme Design<\u002Fa><a href=\"Performance%20Incentive%20Design.bundled.html\" style=\"display:block;text-decoration:none;color:var(--soft);font-size:13px;font-weight:600;padding:5px 0;transition:color .2s ease\" onmouseover=\"this.style.color='var(--ink)'\" onmouseout=\"this.style.color='var(--soft)'\">Sales Incentive Programs<\u002Fa><a href=\"Performance%20Incentive%20Design.bundled.html\" style=\"display:block;text-decoration:none;color:var(--soft);font-size:13px;font-weight:600;padding:5px 0;transition:color .2s ease\" onmouseover=\"this.style.color='var(--ink)'\" onmouseout=\"this.style.color='var(--soft)'\">Executive Incentives<\u002Fa><a href=\"Performance%20Incentive%20Design.bundled.html\" style=\"display:block;text-decoration:none;color:var(--soft);font-size:13px;font-weight:600;padding:5px 0;transition:color .2s ease\" onmouseover=\"this.style.color='var(--ink)'\" onmouseout=\"this.style.color='var(--soft)'\">Performance Frameworks<\u002Fa><a href=\"Performance%20Incentive%20Design.bundled.html\" style=\"display:block;text-decoration:none;color:var(--soft);font-size:13px;font-weight:600;padding:5px 0;transition:color .2s ease\" onmouseover=\"this.style.color='var(--ink)'\" onmouseout=\"this.style.color='var(--soft)'\">KPI &amp; Goal Alignment<\u002Fa><\u002Fdiv><div><a href=\"AI%20Workforce%20Strategy.bundled.html\" style=\"display:block;text-decoration:none;color:var(--orange);font-size:13.5px;font-weight:800;text-transform:uppercase;letter-spacing:.02em;margin-bottom:12px;padding-bottom:10px;border-bottom:1px solid var(--line)\">AI &amp; Workforce Strategy<\u002Fa><a href=\"AI%20Workforce%20Strategy.bundled.html\" style=\"display:block;text-decoration:none;color:var(--soft);font-size:13px;font-weight:600;padding:5px 0;transition:color .2s ease\" onmouseover=\"this.style.color='var(--ink)'\" onmouseout=\"this.style.color='var(--soft)'\">AI Workforce Readiness<\u002Fa><a href=\"AI%20Workforce%20Strategy.bundled.html\" style=\"display:block;text-decoration:none;color:var(--soft);font-size:13px;font-weight:600;padding:5px 0;transition:color .2s ease\" onmouseover=\"this.style.color='var(--ink)'\" onmouseout=\"this.style.color='var(--soft)'\">Workforce Performance Reviews<\u002Fa><a href=\"AI%20Workforce%20Strategy.bundled.html\" style=\"display:block;text-decoration:none;color:var(--soft);font-size:13px;font-weight:600;padding:5px 0;transition:color .2s ease\" onmouseover=\"this.style.color='var(--ink)'\" onmouseout=\"this.style.color='var(--soft)'\">Role &amp; Job Architecture<\u002Fa><a href=\"AI%20Workforce%20Strategy.bundled.html\" style=\"display:block;text-decoration:none;color:var(--soft);font-size:13px;font-weight:600;padding:5px 0;transition:color .2s ease\" onmouseover=\"this.style.color='var(--ink)'\" onmouseout=\"this.style.color='var(--soft)'\">Skills-Based Planning<\u002Fa><a href=\"AI%20Workforce%20Strategy.bundled.html\" style=\"display:block;text-decoration:none;color:var(--soft);font-size:13px;font-weight:600;padding:5px 0;transition:color .2s ease\" onmouseover=\"this.style.color='var(--ink)'\" onmouseout=\"this.style.color='var(--soft)'\">Future of Work Strategy<\u002Fa><\u002Fdiv><\u002Fdiv><\u002Fdiv>\n        <\u002Fdiv>\n          <a href=\"Strategy%20Diagnostic.bundled.html\" class=\"mc-link\" style=\"color:inherit;text-decoration:none\">Diagnostic<\u002Fa>\n          <a href=\"Rollout.bundled.html\" class=\"mc-link\" style=\"color:inherit;text-decoration:none\">Rollout<\u002Fa>\n          <a href=\"Insights.bundled.html\" class=\"mc-link\" style=\"color:inherit;text-decoration:none\">Insights<\u002Fa>\n          <a href=\"Who%20We%20Work%20With.bundled.html\" class=\"mc-link\" style=\"color:inherit;text-decoration:none\">Who we work with<\u002Fa>\n          <a href=\"About.bundled.html\" class=\"mc-link\" style=\"color:var(--orange);text-decoration:none\">About<\u002Fa>\n        <\u002Fdiv>\n        <a href=\"Book%20a%20Workforce%20Review.bundled.html\" style=\"display:inline-flex;align-items:center;gap:8px;background:var(--orange);color:#fff;text-decoration:none;font-size:13.5px;font-weight:700;padding:11px 20px;border-radius:999px\">Book a call<\u002Fa>\n      <\u002Fnav>\n      <div style=\"position:relative;z-index:4;padding:48px 36px 56px;max-width:64ch\">\n        <div style=\"font-size:12px;letter-spacing:.16em;text-transform:uppercase;color:var(--orange);font-weight:700;margin-bottom:18px\">About<\u002Fdiv>\n        <h1 style=\"font-size:58px;line-height:.97;letter-spacing:-.03em;margin:0 0 20px;font-weight:800;text-transform:uppercase\">We believe performance is <span style=\"color:var(--ghost)\">engineered, not hoped for.<\u002Fspan><\u002Fh1>\n        <p style=\"font-size:17.5px;line-height:1.6;color:var(--soft);max-width:54ch;margin:0\">MC Incentives exists to give organisations a deliberate architecture for how work is rewarded, recognised and performed — built for the way work actually operates in the AI era.<\u002Fp>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- WHY WE EXIST -->\n  <section style=\"max-width:1280px;margin:84px auto 0;padding:0 22px;animation:rise .8s cubic-bezier(.2,.7,.2,1) both\">\n    <div style=\"display:grid;grid-template-columns:.9fr 1.1fr;gap:46px;align-items:start\">\n      <div>\n        <div style=\"font-size:12px;letter-spacing:.16em;text-transform:uppercase;color:var(--orange);font-weight:700;margin-bottom:16px\">Why we exist<\u002Fdiv>\n        <h2 style=\"font-size:36px;line-height:1.02;letter-spacing:-.025em;margin:0;font-weight:800;text-transform:uppercase\">Most performance problems are <span style=\"color:var(--ghost)\">design problems.<\u002Fspan><\u002Fh2>\n      <\u002Fdiv>\n      <div>\n        <p style=\"font-size:17px;line-height:1.62;color:var(--ink);margin:0 0 16px\">Organisations rarely underperform because their people lack effort. They underperform because the systems around those people — reward, recognition, performance, role design — were never built to work together.<\u002Fp>\n        <p style=\"font-size:16px;line-height:1.62;color:var(--soft);margin:0\">We exist to close that gap: to replace inherited, disconnected frameworks with a deliberate system that makes performance repeatable and fair — even as work keeps changing.<\u002Fp>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- BELIEF STATEMENT -->\n  <section style=\"max-width:1280px;margin:84px auto 0;padding:0 22px;animation:rise .8s cubic-bezier(.2,.7,.2,1) both\">\n    <div style=\"position:relative;overflow:hidden;background:var(--ink);color:#fff;border-radius:34px;padding:64px 54px;text-align:center\">\n      <div style=\"position:absolute;top:-90px;left:-70px;width:300px;height:300px;pointer-events:none\">\n        <svg viewBox=\"0 0 320 320\" style=\"width:100%;height:100%\">\n          <g><rect x=\"80\" y=\"30\" width=\"204\" height=\"58\" rx=\"29\" fill=\"rgba(255,85,34,.5)\"><\u002Frect><rect x=\"40\" y=\"98\" width=\"204\" height=\"58\" rx=\"29\" fill=\"rgba(255,122,69,.35)\"><\u002Frect><rect x=\"80\" y=\"166\" width=\"204\" height=\"58\" rx=\"29\" fill=\"rgba(255,255,255,.12)\"><\u002Frect><rect x=\"40\" y=\"234\" width=\"204\" height=\"58\" rx=\"29\" fill=\"rgba(255,85,34,.5)\"><\u002Frect><\u002Fg>\n        <\u002Fsvg>\n      <\u002Fdiv>\n      <div style=\"position:relative\">\n        <div style=\"font-size:12px;letter-spacing:.16em;text-transform:uppercase;color:var(--peach);font-weight:700;margin-bottom:22px\">Our belief<\u002Fdiv>\n        <h2 style=\"font-size:38px;line-height:1.1;letter-spacing:-.02em;margin:0 auto;max-width:20ch;font-weight:800;text-transform:uppercase\">Reward is not a cost to manage. It is <span style=\"color:var(--orange)\">behavioural architecture<\u002Fspan> to design.<\u002Fh2>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- IMAGE BAND -->\n  <section style=\"max-width:1280px;margin:84px auto 0;padding:0 22px;animation:rise .8s cubic-bezier(.2,.7,.2,1) both\">\n    <div style=\"position:relative;height:420px;border-radius:34px;overflow:hidden;background:var(--peach)\">\n      <img src=\"17e2bbbb-f800-4eab-a150-10cb42bf96e7\" alt=\"\" style=\"position:absolute;inset:0;width:100%;height:100%;object-fit:cover;object-position:50% 35%\">\n      <div style=\"position:absolute;inset:0;background:linear-gradient(110deg,rgba(18,12,8,.6),rgba(18,12,8,.1) 60%,transparent);z-index:2\"><\u002Fdiv>\n      <div style=\"position:absolute;left:42px;bottom:38px;z-index:3;color:#fff;max-width:32ch\">\n        <div style=\"font-size:11px;letter-spacing:.16em;text-transform:uppercase;font-weight:700;opacity:.85;margin-bottom:10px\">Architecture, not patchwork<\u002Fdiv>\n        <div style=\"font-size:32px;font-weight:800;line-height:1.04;letter-spacing:-.02em\">We design the structure <span style=\"border-bottom:3px solid #fff\">underneath.<\u002Fspan><\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- PERSPECTIVE -->\n  <section style=\"max-width:1280px;margin:84px auto 0;padding:0 22px;animation:rise .8s cubic-bezier(.2,.7,.2,1) both\">\n    <div style=\"font-size:12px;letter-spacing:.16em;text-transform:uppercase;color:var(--orange);font-weight:700;margin-bottom:16px\">Our perspective on modern work<\u002Fdiv>\n    <h2 style=\"font-size:34px;line-height:1.04;letter-spacing:-.02em;margin:0 0 28px;font-weight:800;text-transform:uppercase\">What we see that others miss.<\u002Fh2>\n    <div style=\"display:grid;grid-template-columns:repeat(4,1fr);gap:14px\">\n      <sc-for list=\"{{ perspective }}\" as=\"p\" hint-placeholder-count=\"4\">\n        <div style=\"background:var(--blush);border-radius:var(--rsm);padding:28px 24px\">\n          <div style=\"font-size:11px;letter-spacing:.1em;text-transform:uppercase;color:var(--orange);font-weight:700;margin-bottom:12px\">{{ p.k }}<\u002Fdiv>\n          <h3 style=\"font-size:17px;line-height:1.2;margin:0 0 8px;font-weight:700\">{{ p.t }}<\u002Fh3>\n          <p style=\"font-size:14px;line-height:1.5;color:var(--soft);margin:0\">{{ p.d }}<\u002Fp>\n        <\u002Fdiv>\n      <\u002Fsc-for>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- APPROACH -->\n  <section style=\"max-width:1280px;margin:84px auto 0;padding:0 22px;animation:rise .8s cubic-bezier(.2,.7,.2,1) both\">\n    <div style=\"font-size:12px;letter-spacing:.16em;text-transform:uppercase;color:var(--orange);font-weight:700;margin-bottom:16px\">How we work<\u002Fdiv>\n    <h2 style=\"font-size:34px;line-height:1.04;letter-spacing:-.02em;margin:0 0 28px;font-weight:800;text-transform:uppercase\">Diagnostic. Design. <span style=\"color:var(--ghost)\">Implementation.<\u002Fspan><\u002Fh2>\n    <div style=\"display:grid;grid-template-columns:repeat(3,1fr);gap:16px\">\n      <sc-for list=\"{{ approach }}\" as=\"a\" hint-placeholder-count=\"3\">\n        <div style=\"background:#fff;border:1px solid var(--line);border-radius:var(--r);padding:34px 30px\">\n          <div style=\"width:46px;height:46px;border-radius:13px;background:{{ a.bg }};color:{{ a.fg }};display:flex;align-items:center;justify-content:center;font-weight:800;font-size:16px;margin-bottom:18px\">{{ a.n }}<\u002Fdiv>\n          <h3 style=\"font-size:21px;margin:0 0 10px;font-weight:800;text-transform:uppercase;letter-spacing:-.015em\">{{ a.t }}<\u002Fh3>\n          <p style=\"font-size:14.5px;line-height:1.55;color:var(--soft);margin:0\">{{ a.d }}<\u002Fp>\n        <\u002Fdiv>\n      <\u002Fsc-for>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- CTA -->\n  <section style=\"max-width:1280px;margin:80px auto 0;padding:0 22px\">\n    <div style=\"position:relative;overflow:hidden;border-radius:34px;background:linear-gradient(135deg,#FFF1ED,#FFE2D9 55%,#FFD0C7);padding:60px 50px;text-align:center\">\n      <h2 style=\"font-size:34px;line-height:1.04;letter-spacing:-.025em;margin:0 auto 14px;max-width:24ch;font-weight:800;text-transform:uppercase\">Let's design how your <span style=\"color:var(--orange)\">organisation performs.<\u002Fspan><\u002Fh2>\n      <p style=\"font-size:16px;line-height:1.6;color:rgba(35,34,34,.72);max-width:46ch;margin:0 auto 28px\">It starts with a Strategy Diagnostic — or a 30-minute conversation.<\u002Fp>\n      <
